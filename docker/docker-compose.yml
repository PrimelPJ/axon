version: "3.9"

services:
  # ─── Axon Gateway ────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      AXON_HOST: "0.0.0.0"
      AXON_PORT: "8080"
      AXON_DEBUG: "false"
      AXON_CONFIG_FILE: "/config/config.yaml"
      AXON_REDIS__URL: "redis://redis:6379/0"
      AXON_AUTH__JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      AXON_OBSERVABILITY__LOG_FORMAT: "json"
      AXON_OBSERVABILITY__TRACING_ENABLED: "false"
    volumes:
      - ../config.yaml:/config/config.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - axon-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "6379:6379"
    networks:
      - axon-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Example ML Backend (echo server) ────────────────────────────────────────
  ml-backend:
    image: python:3.12-slim
    command: >
      python -c "
      from http.server import BaseHTTPRequestHandler, HTTPServer
      import json, time
      class H(BaseHTTPRequestHandler):
        def do_POST(self):
          body = self.rfile.read(int(self.headers.get('Content-Length', 0)))
          resp = json.dumps({'prediction': 0.97, 'model': 'v2', 'latency_ms': 12}).encode()
          self.send_response(200)
          self.send_header('Content-Type', 'application/json')
          self.send_header('Content-Length', len(resp))
          self.end_headers()
          self.wfile.write(resp)
        def log_message(self, *a): pass
      HTTPServer(('0.0.0.0', 8000), H).serve_forever()
      "
    ports:
      - "8000:8000"
    networks:
      - axon-net

  # ─── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - axon-net
    depends_on:
      - gateway

  # ─── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.1
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "axon"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - axon-net
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:

networks:
  axon-net:
    driver: bridge
